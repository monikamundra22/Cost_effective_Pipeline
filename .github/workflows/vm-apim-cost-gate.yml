# ============================================================================
# vm-apim-cost-gate.yml – VM & APIM Cost Estimation Pipeline
# ============================================================================
#
# Standalone pipeline that estimates Azure VM and API Management costs
# using the Azure Retail Prices API.
#
# Inputs:
#   - vm_size:        Azure VM size (e.g. Standard_B2s)
#   - vm_os:          linux or windows
#   - apim_sku:       APIM tier (Developer, Basic, Standard, Premium, etc.)
#   - apim_units:     Number of APIM scale units
#   - region:         Azure region
#   - cost_threshold: Monthly USD limit — requires approval if exceeded
# ============================================================================

name: "VM & APIM – Cost Estimate"

on:
  workflow_dispatch:
    inputs:
      vm_size:
        description: "Azure VM size"
        required: true
        default: "Standard_B2s"
        type: choice
        options:
          - Standard_B1s
          - Standard_B2s
          - Standard_B2ms
          - Standard_B4ms
          - Standard_D2s_v3
          - Standard_D4s_v3
          - Standard_D2s_v5
          - Standard_D4s_v5
          - Standard_D2as_v5
          - Standard_E2s_v3
          - Standard_F2s_v2
      vm_os:
        description: "VM operating system"
        required: true
        default: "linux"
        type: choice
        options:
          - linux
          - windows
      apim_sku:
        description: "API Management tier"
        required: true
        default: "Developer"
        type: choice
        options:
          - Consumption
          - Developer
          - Basic
          - Standard
          - Premium
          - BasicV2
          - StandardV2
      apim_units:
        description: "Number of APIM scale units"
        required: false
        default: "1"
      region:
        description: "Azure region"
        required: true
        default: "eastus"
        type: choice
        options:
          - eastus
          - eastus2
          - westus
          - westus2
          - westus3
          - centralus
          - northeurope
          - westeurope
          - uksouth
          - southeastasia
      cost_threshold:
        description: "Monthly cost threshold (USD). 0 = block all."
        required: false
        default: "500"

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.11"
  AZURE_RESOURCE_GROUP: "rg-vm-apim-${{ github.run_id }}"
  BICEP_TEMPLATE: "infra/vm-apim.bicep"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. COST ESTIMATION
  # ──────────────────────────────────────────────────────────────────────────
  estimate-costs:
    name: "Estimate VM & APIM Costs"
    runs-on: ubuntu-latest

    outputs:
      total_cost: ${{ steps.cost.outputs.total_cost }}
      cost_exceeded: ${{ steps.cost.outputs.cost_exceeded }}
      cost_delta: ${{ steps.cost.outputs.cost_delta }}
      vm_cost: ${{ steps.cost.outputs.vm_cost }}
      apim_cost: ${{ steps.cost.outputs.apim_cost }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install requests

      - name: Estimate costs from Azure Pricing API
        id: cost
        run: |
          python scripts/estimate_vm_apim_costs.py \
            --vm-size "${{ inputs.vm_size }}" \
            --vm-os "${{ inputs.vm_os }}" \
            --apim-sku "${{ inputs.apim_sku }}" \
            --apim-units "${{ inputs.apim_units }}" \
            --region "${{ inputs.region }}" \
            --threshold "${{ inputs.cost_threshold }}" \
            --output vm-apim-cost-report.md

      - name: Upload cost report
        if: always()
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: vm-apim-cost-report
          path: vm-apim-cost-report.md

  # ──────────────────────────────────────────────────────────────────────────
  # 2. DEPLOY (auto) – runs directly when cost is within threshold
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy VM & APIM"
    needs: estimate-costs
    if: |
      needs.estimate-costs.result == 'success' &&
      needs.estimate-costs.outputs.cost_exceeded != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Show summary
        run: |
          echo "## ✅ Cost Within Threshold – Deploying" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| VM (${{ inputs.vm_size }}) | \$${{ needs.estimate-costs.outputs.vm_cost }}/mo |" >> $GITHUB_STEP_SUMMARY
          echo "| APIM (${{ inputs.apim_sku }}) | \$${{ needs.estimate-costs.outputs.apim_cost }}/mo |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Cost** | **\$${{ needs.estimate-costs.outputs.total_cost }}/mo** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Threshold** | **\$${{ inputs.cost_threshold }}/mo** |" >> $GITHUB_STEP_SUMMARY

      - name: Login to Azure
        uses: azure/login@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ inputs.region }} \
            --tags Purpose=CostPipeline

      - name: Deploy VM & APIM
        run: |
          echo "🚀 Deploying VM (${{ inputs.vm_size }}) and APIM (${{ inputs.apim_sku }})..."

          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ${{ env.BICEP_TEMPLATE }} \
            --parameters \
              vmSize=${{ inputs.vm_size }} \
              vmOs=${{ inputs.vm_os }} \
              apimSku=${{ inputs.apim_sku }} \
              apimUnits=${{ inputs.apim_units }} \
              location=${{ inputs.region }} \
              adminUsername=azureuser \
              adminPasswordOrKey='${{ secrets.VM_ADMIN_PASSWORD_OR_KEY }}' \
              apimPublisherEmail='${{ secrets.APIM_PUBLISHER_EMAIL }}' \
              apimPublisherName='CostPipeline' \
            --name "deploy-${{ github.run_number }}" \
            --verbose

          echo "✅ Deployment complete."

      - name: Show deployment outputs
        run: |
          az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name "deploy-${{ github.run_number }}" \
            --query properties.outputs \
            --output table

  # ──────────────────────────────────────────────────────────────────────────
  # 3. APPROVAL GATE – pauses for user approval when cost exceeds threshold
  #    The user sees the cost breakdown BEFORE deciding to approve or reject.
  #    Requires a GitHub Environment "cost-approval" with required reviewers.
  # ──────────────────────────────────────────────────────────────────────────
  approval-gate:
    name: "⚠️ Cost Exceeded – Waiting for Approval"
    needs: estimate-costs
    if: |
      needs.estimate-costs.result == 'success' &&
      needs.estimate-costs.outputs.cost_exceeded == 'true'
    runs-on: ubuntu-latest
    environment: cost-approval

    steps:
      - name: Show cost overage for reviewer
        run: |
          echo "## ⚠️ Cost Threshold Exceeded – Approval Granted" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| VM (${{ inputs.vm_size }}) | \$${{ needs.estimate-costs.outputs.vm_cost }}/mo |" >> $GITHUB_STEP_SUMMARY
          echo "| APIM (${{ inputs.apim_sku }}) | \$${{ needs.estimate-costs.outputs.apim_cost }}/mo |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Cost** | **\$${{ needs.estimate-costs.outputs.total_cost }}/mo** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Threshold** | **\$${{ inputs.cost_threshold }}/mo** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Over by** | **+\$${{ needs.estimate-costs.outputs.cost_delta }}/mo** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ✅ Approved – proceeding to deployment." >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # 4. DEPLOY (approved) – runs after user approves the cost overage
  # ──────────────────────────────────────────────────────────────────────────
  deploy-after-approval:
    name: "Deploy VM & APIM (Approved)"
    needs: [estimate-costs, approval-gate]
    if: needs.approval-gate.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Show summary
        run: |
          echo "## ✅ Deploying with Approved Cost Overage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------:|" >> $GITHUB_STEP_SUMMARY
          echo "| VM (${{ inputs.vm_size }}) | \$${{ needs.estimate-costs.outputs.vm_cost }}/mo |" >> $GITHUB_STEP_SUMMARY
          echo "| APIM (${{ inputs.apim_sku }}) | \$${{ needs.estimate-costs.outputs.apim_cost }}/mo |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Cost** | **\$${{ needs.estimate-costs.outputs.total_cost }}/mo** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Threshold** | **\$${{ inputs.cost_threshold }}/mo** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Over by** | **+\$${{ needs.estimate-costs.outputs.cost_delta }}/mo** |" >> $GITHUB_STEP_SUMMARY

      - name: Login to Azure
        uses: azure/login@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ inputs.region }} \
            --tags Purpose=CostPipeline

      - name: Deploy VM & APIM (approved overage)
        run: |
          echo "🚀 Deploying with approved overage (+\$${{ needs.estimate-costs.outputs.cost_delta }}/mo)..."

          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ${{ env.BICEP_TEMPLATE }} \
            --parameters \
              vmSize=${{ inputs.vm_size }} \
              vmOs=${{ inputs.vm_os }} \
              apimSku=${{ inputs.apim_sku }} \
              apimUnits=${{ inputs.apim_units }} \
              location=${{ inputs.region }} \
              adminUsername=azureuser \
              adminPasswordOrKey='${{ secrets.VM_ADMIN_PASSWORD_OR_KEY }}' \
              apimPublisherEmail='${{ secrets.APIM_PUBLISHER_EMAIL }}' \
              apimPublisherName='CostPipeline' \
            --name "deploy-${{ github.run_number }}" \
            --verbose

          echo "✅ Deployment complete."

      - name: Show deployment outputs
        run: |
          az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name "deploy-${{ github.run_number }}" \
            --query properties.outputs \
            --output table
