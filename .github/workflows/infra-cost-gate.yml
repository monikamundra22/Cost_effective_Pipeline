# ============================================================================
# infra-cost-gate.yml – Infrastructure Pipeline with Cost Estimation Gate
# ============================================================================
#
# Triggers on every PR that touches infra/ files.
# Steps:
#   1. Checkout & authenticate to Azure
#   2. Run `az deployment group what-if` to preview changes
#   3. Run cost estimation script against the what-if output
#   4. Post results as a PR comment
#   5. Fail the check (block merge) if cost > threshold
# ============================================================================

name: "Infrastructure – What-If & Cost Gate"

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "infra/**"
      - "scripts/estimate_costs.py"
      - ".github/workflows/infra-cost-gate.yml"

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      cost_threshold:
        description: "Monthly cost threshold (USD). 0 = no gate."
        required: false
        default: "500"

# ─── Permissions ────────────────────────────────────────────────────────────

permissions:
  contents: read
  pull-requests: write        # needed to post PR comments
  id-token: write             # needed for Azure OIDC login

# ─── Concurrency ────────────────────────────────────────────────────────────

concurrency:
  group: infra-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# ─── Environment Variables ──────────────────────────────────────────────────

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  COST_THRESHOLD: ${{ github.event.inputs.cost_threshold || '500' }}
  AZURE_RESOURCE_GROUP: "rg-costpipe-${{ github.event.inputs.environment || 'dev' }}"
  ARM_TEMPLATE: "infra/main.bicep"
  PYTHON_VERSION: "3.11"

# ============================================================================
# Jobs
# ============================================================================

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. WHAT-IF ANALYSIS & COST ESTIMATION
  # ──────────────────────────────────────────────────────────────────────────
  what-if-and-cost:
    name: "What-If & Cost Estimate"
    runs-on: ubuntu-latest

    outputs:
      total_cost: ${{ steps.cost.outputs.total_cost }}
      cost_exceeded: ${{ steps.cost.outputs.cost_exceeded }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # ── Azure Login (OIDC – federated credentials, no secrets stored) ──
      - name: Login to Azure
        uses: azure/login@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Validate Bicep syntax ────────────────────────────────────────────
      - name: Validate Bicep template
        run: |
          az bicep build --file ${{ env.ARM_TEMPLATE }}
          echo "✅ Bicep template compiled successfully."

      # ── Run What-If ──────────────────────────────────────────────────────
      - name: Run What-If analysis
        id: whatif
        run: |
          echo "🔍 Running what-if for environment: ${{ env.ENVIRONMENT }}"

          az deployment group what-if \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ${{ env.ARM_TEMPLATE }} \
            --parameters infra/parameters/${{ env.ENVIRONMENT }}.bicepparam \
            --result-format ResourceIdOnly \
            --no-pretty-print \
            > what-if-output.json 2>&1 || true

          # Also capture full JSON for the cost script
          az deployment group what-if \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ${{ env.ARM_TEMPLATE }} \
            --parameters infra/parameters/${{ env.ENVIRONMENT }}.bicepparam \
            --out json \
            > what-if-full.json 2>&1 || true

          echo "📋 What-if output saved."

          # Save human-readable summary for the PR comment
          az deployment group what-if \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ${{ env.ARM_TEMPLATE }} \
            --parameters infra/parameters/${{ env.ENVIRONMENT }}.bicepparam \
            2>&1 | tee what-if-readable.txt || true

      # ── Set up Python ────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: pip install requests

      # ── Estimate Costs ───────────────────────────────────────────────────
      - name: Estimate infrastructure costs
        id: cost
        run: |
          python scripts/estimate_costs.py \
            --what-if-file what-if-full.json \
            --threshold ${{ env.COST_THRESHOLD }} \
            --output cost-report.md

          echo "Cost estimation outputs:"
          cat "$GITHUB_OUTPUT"

      # ── Upload artifacts ─────────────────────────────────────────────────
      - name: Upload cost report & what-if output
        if: always()
        uses: actions/upload-artifact@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: infra-cost-report
          path: |
            cost-report.md
            what-if-full.json
            what-if-readable.txt

      # ── Post PR Comment ──────────────────────────────────────────────────
      - name: Post cost report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Read the cost report
            let costReport = '';
            try {
              costReport = fs.readFileSync('cost-report.md', 'utf8');
            } catch (e) {
              costReport = '⚠️ Cost report could not be generated.';
            }

            // Read what-if readable output
            let whatIfOutput = '';
            try {
              whatIfOutput = fs.readFileSync('what-if-readable.txt', 'utf8');
            } catch (e) {
              whatIfOutput = 'What-if output not available.';
            }

            const body = [
              '## 🏗️ Infrastructure Change Analysis',
              '',
              `**Environment:** \`${{ env.ENVIRONMENT }}\``,
              `**Cost Threshold:** \`$${{ env.COST_THRESHOLD }}/month\``,
              '',
              '<details>',
              '<summary>📋 What-If Output (click to expand)</summary>',
              '',
              '```',
              whatIfOutput,
              '```',
              '',
              '</details>',
              '',
              costReport,
              '',
              `> 🤖 *Generated by [Infrastructure Cost Gate](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})*`,
            ].join('\n');

            // Find existing comment to update (avoid duplicates)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '## 🏗️ Infrastructure Change Analysis';
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
              console.log('Created new PR comment');
            }

  # ──────────────────────────────────────────────────────────────────────────
  # 2. DEPLOY (only on merge to main, after cost gate passes)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy Infrastructure"
    needs: what-if-and-cost
    if: |
      always() &&
      needs.what-if-and-cost.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Login to Azure
        uses: azure/login@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        run: |
          echo "🚀 Deploying to ${{ env.ENVIRONMENT }}..."

          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ${{ env.ARM_TEMPLATE }} \
            --parameters infra/parameters/${{ env.ENVIRONMENT }}.bicepparam \
            --name "deploy-${{ github.run_number }}" \
            --verbose

          echo "✅ Deployment complete."

      - name: Show deployment outputs
        run: |
          az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name "deploy-${{ github.run_number }}" \
            --query properties.outputs \
            --output table
